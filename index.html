<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- Tailwind daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font (geist) -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <!-- font awesome CDN -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

     <!-- internal CSS  -->
      <style>
        *{
            font-family: "Geist", sans-serif;
        }
      </style>
</head>

<body class="min-h-screen bg-base-200">

    <!-- Header section -->

    <header class="pt-6 pr-36 pb-20 pl-12">

        <!-- Header Title -->
    <h1 class="text-[32px] text-[#002C5C] font-bold ">Job Application Tracker</h1>

        <!-- cards of Header -->
    <div class="grid grid-cols-3 gap-6 mt-4">

        <!-- card/total -->
        <div class="bg-white rounded-lg shadow-sm p-6">
            <p class="text-info-content font-medium">Total</p>
            <h2 class="text-2xl text-info-content font-bold">8</h2>
        </div>

        <!-- card/Interview -->
        <div class="bg-white rounded-lg shadow-sm p-6">
            <p class=" text-info-content font-medium">Interview</p>
            <h2 class="text-2xl text-primary font-bold">0</h2>
        </div>

        <!-- card/ Rejected -->
        <div class="bg-white rounded-lg shadow-sm p-6">
            <p class="text-info-content font-medium">Rejected</p>
            <h2 class="text-2xl text-error font-bold">0</h2>
        </div>
    </div> 

    </header>

    <!-- hero section -->
     <div class="pr-36 pb-5 pl-12 flex justify-between">

            <!-- section heading -->
            <h2 class="text-2xl font-semibold text-[#002C5C]">Available jobs</h2>
            <span class="text-[#64748B] font-medium">8 Jobs</span>
    </div>

    <div class="pr-36 pb-5 pl-12 flex gap-3">

            <!-- Buttons -->
            <button class="btn btn-primary rounded-md px-10">All</button>

            <button class="btn btn-soft bg-white rounded-md">
                <span class="text-[#64748B]">Interview</span></button>

            <button class="btn btn-soft bg-white rounded-md">
                <span class="text-[#64748B]">Rejected</span></button>

     </div>

     <div class="pl-12 pr-36 pb-20 space-y-4">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 relative">
             <div class="flex justify-between items-start">
            <div>
                <h2 class="text-xl font-bold text-[#002C5C]">Mobile First Corp</h2>
                <p class="text-[#64748B] font-medium">React Native Developer</p>
            </div>
            <button class="hover:text-error">
                <i class="fa-regular fa-trash-can text-lg"></i>
            </button>
        </div>
        <div class="flex items-center gap-2 text-[#94A3B8] text-sm mt-3">
            <span>Remote</span>
            <span class="text-lg leading-none">&bull;</span>
            <span>Full-time</span>
            <span class="text-lg leading-none">&bull;</span>
            <span>$130,000 - $175,000</span>
        </div>
        <button class="btn btn-soft bg-indigo-50 mt-6">Not Applied</button>

        <p class="text-[#475569] text-sm mt-2 mb-4 leading-relaxed max-w-3xl">
            Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.
        </p>

        <div class="flex gap-3">
         <button class="btn btn-outline btn-success btn-sm border-2 font-bold px-6 hover:bg-success hover:text-white">INTERVIEW</button>
                
         <button class="btn btn-outline btn-error btn-sm border-2 font-bold px-6 hover:bg-error hover:text-white">REJECTED</button>
         </div>
                
        </div>
     </div>


</body>
</html>
